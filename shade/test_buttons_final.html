<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shade Chat Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .input-container { display: flex; gap: 10px; margin: 20px 0; }
        input { flex: 1; padding: 10px; }
        button { padding: 10px 20px; }
        #chatContainer { border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: auto; }
        .message { margin: 5px 0; padding: 5px; }
        .user { background: #e3f2fd; text-align: right; }
        .assistant { background: #f5f5f5; }
    </style>
</head>
<body>
    <h1>Shade Chat Test</h1>
    <div id="chatContainer">
        <div class="message assistant">Hello! I'm Shade, your event planning assistant! 🎉</div>
    </div>
    <div class="input-container">
        <input type="text" id="messageInput" placeholder="Type a message..." />
        <button id="sendButton">Send</button>
        <button id="resetButton">Reset</button>
    </div>

    <script>
        // Global variables
        let chatContainer, messageInput, sendButton, resetButton;
        let isInitialized = false;

        // Initialize when DOM is ready
        function initializeApp() {
            if (isInitialized) return;
            
            console.log('Initializing Shade Chat App...');
            
            // Get elements
            chatContainer = document.getElementById('chatContainer');
            messageInput = document.getElementById('messageInput');
            sendButton = document.getElementById('sendButton');
            resetButton = document.getElementById('resetButton');

            // Verify all elements exist
            if (!chatContainer || !messageInput || !sendButton || !resetButton) {
                console.error('Missing required elements:', {
                    chatContainer: !!chatContainer,
                    messageInput: !!messageInput,
                    sendButton: !!sendButton,
                    resetButton: !!resetButton
                });
                return;
            }

            console.log('All elements found, setting up event listeners...');

            // Add message to chat
            function addMessage(content, isUser = false) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;
                messageDiv.innerHTML = content;
                chatContainer.appendChild(messageDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }

            // Send message function
            async function sendMessage() {
                const message = messageInput.value.trim();
                if (!message) {
                    console.log('No message to send');
                    return;
                }

                console.log('Sending message:', message);

                // Add user message to chat
                addMessage(message, true);
                
                // Clear input immediately
                messageInput.value = '';
                sendButton.disabled = true;
                sendButton.textContent = 'Sending...';

                try {
                    const response = await fetch('http://localhost:8000/chat', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ message: message })
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const data = await response.json();
                    console.log('Received response:', data);
                    addMessage(data.reply, false);
                } catch (error) {
                    console.error('Error sending message:', error);
                    addMessage(`Oops! I had trouble with that. Could you try again? 😊`, false);
                } finally {
                    sendButton.disabled = false;
                    sendButton.textContent = 'Send';
                    messageInput.focus();
                }
            }

            // Reset conversation
            async function resetConversation() {
                console.log('Resetting conversation...');
                sendButton.disabled = true;
                resetButton.disabled = true;
                resetButton.textContent = 'Resetting...';

                try {
                    const response = await fetch('http://localhost:8000/reset', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        }
                    });
                    
                    if (response.ok) {
                        addMessage('✨ All set! I\'m ready to help you plan something new and amazing! What would you like to create? 🎉', false);
                    } else {
                        addMessage('❌ Oops! Something went wrong. Let me try again!', false);
                    }
                } catch (error) {
                    console.error('Reset error:', error);
                    addMessage(`❌ Error: ${error.message}`, false);
                } finally {
                    sendButton.disabled = false;
                    resetButton.disabled = false;
                    resetButton.textContent = 'Reset';
                }
            }

            // Event listeners
            sendButton.onclick = function(e) {
                e.preventDefault();
                console.log('Send button clicked');
                sendMessage();
            };

            resetButton.onclick = function(e) {
                e.preventDefault();
                console.log('Reset button clicked');
                resetConversation();
            };

            messageInput.onkeypress = function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    console.log('Enter key pressed');
                    sendMessage();
                }
            };

            isInitialized = true;
            console.log('Shade Chat App initialized successfully!');
        }

        // Initialize when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeApp);
        } else {
            initializeApp();
        }

        // Fallback initialization
        setTimeout(function() {
            if (!isInitialized) {
                console.log('Fallback initialization...');
                initializeApp();
            }
        }, 1000);
    </script>
</body>
</html>
