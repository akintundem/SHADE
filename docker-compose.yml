services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: shade-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    restart: unless-stopped
    networks:
      - event-planner-network

  email-service:
    build:
      context: ./email
    container_name: shade-email-service
    depends_on:
      - rabbitmq
    environment:
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM}
      ALLOWED_TEMPLATES: ${ALLOWED_TEMPLATES}
      RABBITMQ_URL: ${RABBITMQ_URL}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE}
      RABBITMQ_EMAIL_QUEUE: ${RABBITMQ_EMAIL_QUEUE}
      RABBITMQ_EMAIL_ROUTING_KEY: ${RABBITMQ_EMAIL_ROUTING_KEY}
      RABBITMQ_PREFETCH: ${RABBITMQ_PREFETCH}
      RABBITMQ_RECONNECT_MS: ${RABBITMQ_RECONNECT_MS}
      RABBITMQ_REQUEUE_ON_ERROR: ${RABBITMQ_REQUEUE_ON_ERROR}
      APP_ASSET_BUCKET: ${APP_ASSET_BUCKET}
      LOGO_URL: ${LOGO_URL}
    restart: unless-stopped
    networks:
      - event-planner-network

  push-service:
    build:
      context: ./push-service
    image: shade-push-service:local
    container_name: shade-push-service
    depends_on:
      - rabbitmq
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE}
      RABBITMQ_PUSH_QUEUE: ${RABBITMQ_PUSH_QUEUE}
      RABBITMQ_PUSH_ROUTING_KEY: ${RABBITMQ_PUSH_ROUTING_KEY}
      RABBITMQ_PREFETCH: ${RABBITMQ_PREFETCH}
      RABBITMQ_RECONNECT_MS: ${RABBITMQ_RECONNECT_MS}
      RABBITMQ_REQUEUE_ON_ERROR: ${RABBITMQ_REQUEUE_ON_ERROR}
      FIREBASE_SERVICE_ACCOUNT_KEY_PATH: ${FIREBASE_SERVICE_ACCOUNT_KEY_PATH}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
    volumes:
      - ./push-service/cred:/app/cred:ro
    restart: unless-stopped
    networks:
      - event-planner-network

  ai-service:
    build:
      context: ./ai-service
    image: shade-ai-service:local
    container_name: shade-ai-service
    expose:
      - "8000"
    environment:
      PORT: "8000"
      AI_SERVICE_SECRET: ${AI_SERVICE_SECRET}
      EXTERNAL_AI_SERVICE_SECRET: ${EXTERNAL_AI_SERVICE_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RETURN_BASE64: "false"
      AI_OIDC_ISSUER: ${AI_OIDC_ISSUER:-}
      AI_OIDC_AUDIENCE: ${AI_OIDC_AUDIENCE:-}
    # Secrets from host env; do not commit ai-service/.env (use .env.example as template)
    restart: unless-stopped
    networks:
      - event-planner-network

  # Java Spring Boot Application
  java-app:
    build: .
    container_name: event-planner-app
    depends_on:
      - email-service
      - push-service
      - ai-service
    expose:
      - "8080"
    # Allow container to connect to services on host machine (local Redis, Postgres, etc.)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # DNS servers for resolving external hostnames
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      # Mount source code for hot-reload (changes reflect immediately!)
      - ./src:/app/src
      - ./pom.xml:/app/pom.xml
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      # Enable Spring Boot DevTools for hot-reload
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: "true"
      SPRING_DEVTOOLS_RESTART_POLL_INTERVAL: "2s"
      SPRING_DEVTOOLS_RESTART_QUIET_PERIOD: "1s"
      # Optional: set SPRING_JPA_HIBERNATE_DDL_AUTO=create in .env for one run to create tables (PostGIS required); then remove or set to validate.
      # Note: All other environment variables are loaded from env_file (.env)

    # Extended startup time for Maven build on first run
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s  # Allow 2 minutes for Maven to download deps and start
    restart: unless-stopped
    networks:
      - event-planner-network

  # MinIO — lightweight S3-compatible object storage (replaces AWS S3 locally)
  minio:
    image: minio/minio:latest
    container_name: shade-minio
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # MinIO Console (web UI)
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - event-planner-network

  # MinIO bucket initializer — creates required buckets on startup
  minio-init:
    image: minio/mc:latest
    container_name: shade-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/$${AWS_S3_USER_BUCKET:-shade-user-assets};
      mc mb --ignore-existing local/$${AWS_S3_EVENT_BUCKET:-shade-event-assets};
      mc anonymous set download local/$${AWS_S3_USER_BUCKET:-shade-user-assets};
      mc anonymous set download local/$${AWS_S3_EVENT_BUCKET:-shade-event-assets};
      echo 'Buckets created successfully';
      "
    restart: "no"
    networks:
      - event-planner-network

  kong:
    image: kong:3.7
    container_name: shade-api-gateway
    depends_on:
      - java-app
      - ai-service
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_LOG_LEVEL: notice
      KONG_PROXY_LISTEN: 0.0.0.0:8000, 0.0.0.0:8443 ssl
      # Admin API: Only listen on localhost in production, or use KONG_ADMIN_LISTEN=off
      KONG_ADMIN_LISTEN: 127.0.0.1:8001
      # Environment variables for secrets (used in kong.yml)
      # IMPORTANT: Set secure values in production .env files
      GATEWAY_SERVICE_API_KEY: ${GATEWAY_SERVICE_API_KEY}
      AI_GATEWAY_SHARED_SECRET: ${AI_GATEWAY_SHARED_SECRET}
      # CORS origins for production
      KONG_CORS_ORIGINS: ${KONG_CORS_ORIGINS}
    volumes:
      - ./infra/kong/kong.yml:/kong/kong.yml:ro
    ports:
      - "8000:8000"
      - "8443:8443"
      # SECURITY: Kong Admin API (8001) not published - bind to localhost only inside container.
      # For local debug only, temporarily add: "8001:8001" and use from host.
    networks:
      - event-planner-network

volumes:
  maven_cache:  # Cache Maven dependencies for faster builds
  minio_data:   # Persist MinIO data across restarts

networks:
  event-planner-network:
    driver: bridge
