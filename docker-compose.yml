services:
  email-service:
    build:
      context: ./email
    container_name: shade-email-service
    env_file:
      - ${EMAIL_ENV_FILE:-./email/.env}
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - event-planner-network

  push-service:
    build:
      context: ./push-service
    image: ${PUSH_SERVICE_IMAGE:-shade-push-service:local}
    container_name: shade-push-service
    expose:
      - "3100"
    environment:
      PORT: ${PUSH_SERVICE_PORT:-3100}
      PUSH_SERVICE_SECRET: ${EXTERNAL_PUSH_SERVICE_SECRET:-}
      FIREBASE_SERVICE_ACCOUNT_KEY_PATH: ${FIREBASE_SERVICE_ACCOUNT_KEY_PATH:-}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
    restart: unless-stopped
    networks:
      - event-planner-network

  ai-service:
    build:
      context: ./ai-service
    image: ${AI_SERVICE_IMAGE:-shade-ai-service:local}
    container_name: shade-ai-service
    expose:
      - "8000"
    environment:
      PORT: ${AI_SERVICE_PORT:-8000}
      AI_SERVICE_SECRET: ${AI_GATEWAY_SHARED_SECRET:-local-ai-secret}
      EXTERNAL_AI_SERVICE_SECRET: ${AI_GATEWAY_SHARED_SECRET:-local-ai-secret}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4-turbo-preview}
      OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL:-dall-e-3}
      RETURN_BASE64: ${AI_RETURN_BASE64:-false}
      AI_COGNITO_ISSUER: ${AI_COGNITO_ISSUER:-}
      AI_COGNITO_AUDIENCE: ${AI_COGNITO_AUDIENCE:-}
    env_file:
      - ${AI_ENV_FILE:-./ai-service/.env}
    restart: unless-stopped
    networks:
      - event-planner-network

  # Java Spring Boot Application
  java-app:
    build: .
    container_name: event-planner-app
    depends_on:
      - email-service
      - push-service
      - ai-service
    expose:
      - "8080"
    volumes:
      # Mount source code for hot-reload (changes reflect immediately!)
      - ./src:/app/src
      - ./pom.xml:/app/pom.xml
      # Cache Maven dependencies to avoid re-downloading
      - maven_cache:/root/.m2
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      # Enable Spring Boot DevTools for hot-reload
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: "true"
      SPRING_DEVTOOLS_RESTART_POLL_INTERVAL: "2s"
      SPRING_DEVTOOLS_RESTART_QUIET_PERIOD: "1s"

      # DB migrations
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED:-false}

      # Cognito JWT validation
      COGNITO_ISSUER_URI: ${COGNITO_ISSUER_URI:-}
      COGNITO_JWK_SET_URI: ${COGNITO_JWK_SET_URI:-}
      COGNITO_AUDIENCE: ${COGNITO_AUDIENCE:-}

      # Database — uses Railway's DATABASE_URL or external database
      DATABASE_URL: ${DATABASE_URL:-}
      DB_HOST: ${DB_HOST:-}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-}
      DB_USERNAME: ${DB_USERNAME:-}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-20}
      DB_POOL_MIN_IDLE: ${DB_POOL_MIN_IDLE:-5}
      DB_CONNECTION_TIMEOUT: ${DB_CONNECTION_TIMEOUT:-30000}
      DB_IDLE_TIMEOUT: ${DB_IDLE_TIMEOUT:-600000}
      DB_MAX_LIFETIME: ${DB_MAX_LIFETIME:-1800000}

      # Redis — uses Railway's REDIS_URL or external Redis
      REDIS_URL: ${REDIS_URL:-}
      SPRING_REDIS_HOST: ${SPRING_REDIS_HOST:-}
      SPRING_REDIS_PORT: ${SPRING_REDIS_PORT:-6379}
      SPRING_REDIS_PASSWORD: ${SPRING_REDIS_PASSWORD:-}

      # MongoDB — uses MONGODB_URL or external MongoDB
      MONGODB_URL: ${MONGODB_URL:-}

      # JWT + Logging
      JWT_SECRET: ${JWT_SECRET}
      LOG_PATTERN: ${LOG_PATTERN:-%d{yyyy-MM-dd HH:mm:ss} - %msg%n}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      AUTH_SESSION_MAX_CONCURRENT: ${AUTH_SESSION_MAX_CONCURRENT:-5}
      CACHE_MAX_SIZE: ${CACHE_MAX_SIZE:-1000}
      CACHE_EXPIRE_AFTER_WRITE: ${CACHE_EXPIRE_AFTER_WRITE:-300s}

      FIREBASE_SERVICE_ACCOUNT_KEY_PATH: ${FIREBASE_SERVICE_ACCOUNT_KEY_PATH:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      # Email service integration
      EXTERNAL_EMAIL_SERVICE_URL: http://shade-email-service:3000
      EXTERNAL_EMAIL_SERVICE_SECRET: ${RESEND_SHARED_SECRET:-}
      RESEND_SHARED_SECRET: ${RESEND_SHARED_SECRET:-}
      EXTERNAL_PUSH_SERVICE_URL: ${EXTERNAL_PUSH_SERVICE_URL:-http://shade-push-service:3100}
      EXTERNAL_PUSH_SERVICE_SECRET: ${EXTERNAL_PUSH_SERVICE_SECRET:-}
      # AI service integration
      EXTERNAL_AI_SERVICE_URL: ${EXTERNAL_AI_SERVICE_URL:-http://kong:8000/ai-service}
      EXTERNAL_AI_SERVICE_SECRET: ${EXTERNAL_AI_SERVICE_SECRET:-}
      SERVICE_API_KEY: ${GATEWAY_SERVICE_API_KEY:-local-gateway-key}
      SERVICE_AUTH_REQUIRE_HEADER: "true"
      EXTERNAL_EMAIL_FROM: ${RESEND_FROM_EMAIL:-Shade <noreply@shade.com>}
      EXTERNAL_EMAIL_FROM_SECURITY: ${RESEND_FROM_SECURITY:-security@noreply.mayokun.dev}
      EXTERNAL_EMAIL_FROM_EVENTS: ${RESEND_FROM_EVENTS:-events@noreply.mayokun.dev}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8000}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080,http://127.0.0.1:3000,http://localhost:8000}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      SWAGGER_UI_PATH: ${SWAGGER_UI_PATH:-/swagger-ui}
      API_DOCS_PATH: ${API_DOCS_PATH:-/v3/api-docs}
      API_TITLE: ${API_TITLE:-Event Planner API}
      API_DESCRIPTION: ${API_DESCRIPTION:-AI-powered event planning platform}
      API_VERSION: ${API_VERSION:-1.0.0}
      WEATHER_BASE_URL: ${WEATHER_BASE_URL:-http://localhost:8089}

    # Extended startup time for Maven build on first run
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s  # Allow 2 minutes for Maven to download deps and start
    restart: unless-stopped
    networks:
      - event-planner-network

  kong:
    image: kong:3.7
    container_name: shade-api-gateway
    depends_on:
      - java-app
      - ai-service
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_LOG_LEVEL: notice
      KONG_PROXY_LISTEN: 0.0.0.0:8000, 0.0.0.0:8443 ssl
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./infra/kong/kong.yml:/kong/kong.yml:ro
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
    networks:
      - event-planner-network

volumes:
  maven_cache:  # Cache Maven dependencies for faster builds

networks:
  event-planner-network:
    driver: bridge
