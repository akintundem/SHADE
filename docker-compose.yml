services:
  # Postgres + PostGIS for schema (avoids host PostGIS requirement)
  postgres:
    image: postgis/postgis:15-3.4
    container_name: shade-postgres
    environment:
      POSTGRES_DB: shade_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shade_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - event-planner-network

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: shade-rabbitmq
    ports:
      - "5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    restart: unless-stopped
    networks:
      - event-planner-network

  email-service:
    build:
      context: ./email
    container_name: shade-email-service
    depends_on:
      - rabbitmq
    environment:
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM}
      ALLOWED_TEMPLATES: ${ALLOWED_TEMPLATES}
      RABBITMQ_URL: ${RABBITMQ_URL}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE}
      RABBITMQ_EMAIL_QUEUE: ${RABBITMQ_EMAIL_QUEUE}
      RABBITMQ_EMAIL_ROUTING_KEY: ${RABBITMQ_EMAIL_ROUTING_KEY}
      RABBITMQ_PREFETCH: ${RABBITMQ_PREFETCH}
      RABBITMQ_RECONNECT_MS: ${RABBITMQ_RECONNECT_MS}
      RABBITMQ_REQUEUE_ON_ERROR: ${RABBITMQ_REQUEUE_ON_ERROR}
      APP_ASSET_BUCKET: ${APP_ASSET_BUCKET}
      LOGO_URL: ${LOGO_URL}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - event-planner-network

  push-service:
    build:
      context: ./push-service
    image: shade-push-service:local
    container_name: shade-push-service
    depends_on:
      - rabbitmq
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE}
      RABBITMQ_PUSH_QUEUE: ${RABBITMQ_PUSH_QUEUE}
      RABBITMQ_PUSH_ROUTING_KEY: ${RABBITMQ_PUSH_ROUTING_KEY}
      RABBITMQ_PREFETCH: ${RABBITMQ_PREFETCH}
      RABBITMQ_RECONNECT_MS: ${RABBITMQ_RECONNECT_MS}
      RABBITMQ_REQUEUE_ON_ERROR: ${RABBITMQ_REQUEUE_ON_ERROR}
      FIREBASE_SERVICE_ACCOUNT_KEY_PATH: ${FIREBASE_SERVICE_ACCOUNT_KEY_PATH}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
    volumes:
      - ./push-service/cred:/app/cred:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - event-planner-network

  ai-service:
    build:
      context: ./ai-service
    image: shade-ai-service:local
    container_name: shade-ai-service
    expose:
      - "8000"
    environment:
      PORT: "8000"
      AI_SERVICE_SECRET: ${AI_SERVICE_SECRET}
      EXTERNAL_AI_SERVICE_SECRET: ${EXTERNAL_AI_SERVICE_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RETURN_BASE64: "false"
      AI_OIDC_ISSUER: ${AI_OIDC_ISSUER:-}
      AI_OIDC_AUDIENCE: ${AI_OIDC_AUDIENCE:-}
    # Secrets from host env; do not commit ai-service/.env (use .env.example as template)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    restart: unless-stopped
    networks:
      - event-planner-network

  # Java Spring Boot Application
  java-app:
    build: .
    container_name: event-planner-app
    depends_on:
      postgres:
        condition: service_healthy
      email-service:
        condition: service_started
      push-service:
        condition: service_started
      ai-service:
        condition: service_started
    expose:
      - "8080"
    ports:
      - "8080:8080"   # Direct access for local smoke tests (bypasses Kong API key)
    # Allow container to connect to services on host machine (MinIO, Redis, etc.)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # DNS servers for resolving external hostnames
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      # Mount source code for hot-reload (changes reflect immediately!)
      - ./src:/app/src
      - ./pom.xml:/app/pom.xml
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      # Use compose Postgres (with PostGIS) and MinIO on host
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: shade_dev
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_SSLMODE: disable
      # Redis on host (when using compose)
      SPRING_REDIS_HOST: ${SPRING_REDIS_HOST:-host.docker.internal}
      # MinIO on host: use localhost so presigned URLs work when clients (e.g. smoke script, browser) run on host
      AWS_S3_ENDPOINT: http://localhost:9000
      AWS_S3_PATH_STYLE: "true"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_S3_USER_BUCKET: ${AWS_S3_USER_BUCKET:-shade-user-assets}
      AWS_S3_EVENT_BUCKET: ${AWS_S3_EVENT_BUCKET:-shade-event-assets}
      # Recreate schema after DB reset (set to validate after first successful seed)
      SPRING_JPA_HIBERNATE_DDL_AUTO: create
      # Enable Spring Boot DevTools for hot-reload
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: "true"
      SPRING_DEVTOOLS_RESTART_POLL_INTERVAL: "2s"
      SPRING_DEVTOOLS_RESTART_QUIET_PERIOD: "1s"

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
    # Extended startup time for Maven build on first run
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s  # Allow 2 minutes for Maven to download deps and start
    restart: unless-stopped
    networks:
      - event-planner-network

  # MinIO runs natively on the host (not in Docker). Start with:
  #   brew services start minio  (or launchctl load ~/Library/LaunchAgents/io.minio.server.plist)
  # S3 API: http://localhost:9000  |  Console: http://localhost:9001
  # Credentials: minioadmin / minioadmin  |  Data dir: ~/minio-data

  kong:
    image: kong:3.7
    container_name: shade-api-gateway
    depends_on:
      - java-app
      - ai-service
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_LOG_LEVEL: notice
      KONG_PROXY_LISTEN: 0.0.0.0:8000, 0.0.0.0:8443 ssl
      # Admin API: Only listen on localhost in production, or use KONG_ADMIN_LISTEN=off
      KONG_ADMIN_LISTEN: 127.0.0.1:8001
      # Environment variables for secrets (used in kong.yml)
      # IMPORTANT: Set secure values in production .env files
      GATEWAY_SERVICE_API_KEY: ${GATEWAY_SERVICE_API_KEY}
      AI_GATEWAY_SHARED_SECRET: ${AI_GATEWAY_SHARED_SECRET}
      # CORS origins for production
      KONG_CORS_ORIGINS: ${KONG_CORS_ORIGINS}
    volumes:
      - ./infra/kong/kong.yml:/kong/kong.yml:ro
    ports:
      - "8000:8000"
      - "8443:8443"
      # SECURITY: Kong Admin API (8001) not published - bind to localhost only inside container.
      # For local debug only, temporarily add: "8001:8001" and use from host.
    networks:
      - event-planner-network

volumes:
  maven_cache:  # Cache Maven dependencies for faster builds

networks:
  event-planner-network:
    driver: bridge
