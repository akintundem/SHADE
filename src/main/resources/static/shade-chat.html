<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shade Assistant Chat</title>
    <style>
        html, body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f6f8;
            height: 100%;
        }
        .app {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px 16px 80px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .panel {
            background: #ffffff;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
        }
        .panel h2 {
            margin: 0 0 12px;
            font-size: 20px;
            color: #1f2937;
        }
        .panel label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #6b7280;
            margin-bottom: 4px;
        }
        .panel input[type="text"],
        .panel textarea {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 10px;
            font-size: 15px;
            color: #111827;
            transition: border-color 0.2s ease;
        }
        .panel input[type="text"]:focus,
        .panel textarea:focus {
            outline: none;
            border-color: #2563eb;
        }
        .panel textarea,
        .panel input[type="url"] {
            min-height: 90px;
            resize: vertical;
        }
        .panel input[type="url"] {
            min-height: unset;
        }
        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        button {
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }
        button.primary {
            background-color: #2563eb;
            color: white;
        }
        button.secondary {
            background-color: #e5e7eb;
            color: #1f2937;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 12px;
            font-size: 13px;
            color: #4b5563;
        }
        .status-bar .session {
            font-weight: 600;
            color: #111827;
        }
        .messages {
            background: #ffffff;
            border-radius: 12px;
            padding: 16px;
            box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.24);
            max-height: 520px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .message.user .bubble {
            align-self: flex-end;
            background: #2563eb;
            color: white;
        }
        .message.assistant .bubble {
            align-self: flex-start;
            background: #f3f4f6;
            color: #111827;
        }
        .bubble {
            padding: 12px 14px;
            border-radius: 16px;
            max-width: 72%;
            white-space: pre-wrap;
            word-break: break-word;
            box-shadow: 0 4px 10px rgba(15, 23, 42, 0.12);
        }
        .meta {
            font-size: 12px;
            color: #6b7280;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .meta .tag {
            background: #e0f2fe;
            color: #0369a1;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 11px;
        }
        .details {
            font-size: 13px;
            background: #f9fafb;
            border-radius: 10px;
            padding: 10px 12px;
            color: #1f2937;
            display: none;
        }
        .message.assistant .details {
            display: block;
        }
        .details h4 {
            margin: 0 0 6px;
            font-size: 13px;
            color: #0f172a;
        }
        .details ul {
            list-style: disc;
            margin: 0 0 10px 18px;
            padding: 0;
        }
        .details div + div {
            margin-top: 8px;
        }
        .log {
            background: #111827;
            color: #d1d5db;
            padding: 12px;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
            font-size: 12px;
            border-radius: 10px;
            max-height: 120px;
            overflow-y: auto;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="panel">
        <h2>Shade Chat Console</h2>
        <label for="tokenInput">Bearer Token (optional)</label>
        <input id="tokenInput" type="text" placeholder="Paste JWT here if required">
        <div class="controls">
            <div style="flex:1; display:flex; flex-direction:column; gap:10px;">
                <div>
                    <label for="baseInput">API Base URL</label>
                    <input id="baseInput" type="url" placeholder="http://localhost:8080">
                </div>
                <span class="status-bar">
                    <span>Session: <span class="session" id="sessionStatus">None</span></span>
                    <span id="readyStatus">Assistant ready</span>
                </span>
            </div>
            <button class="secondary" id="newSessionBtn">Start New Session</button>
            <button class="secondary" id="copySessionBtn" disabled>Copy Session ID</button>
            <button class="secondary" id="toggleDebugBtn">Show Debug</button>
        </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="panel">
        <label for="messageInput">Your Message</label>
        <textarea id="messageInput" placeholder="Type your message to Shade..."></textarea>
        <div class="controls">
            <button class="primary" id="sendBtn">Send Message</button>
            <button class="secondary" id="clearBtn">Clear Conversation (keep session)</button>
        </div>
    </div>

    <div class="panel hidden" id="debugPanel">
        <h2>Debug Log</h2>
        <div class="log" id="logOutput"></div>
    </div>
</div>

<script>
    (() => {
        const messagesEl = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const tokenInput = document.getElementById('tokenInput');
        const sessionStatus = document.getElementById('sessionStatus');
        const readyStatus = document.getElementById('readyStatus');
        const baseInput = document.getElementById('baseInput');
        const sendBtn = document.getElementById('sendBtn');
        const newSessionBtn = document.getElementById('newSessionBtn');
        const clearBtn = document.getElementById('clearBtn');
        const copySessionBtn = document.getElementById('copySessionBtn');
        const logOutput = document.getElementById('logOutput');
        const debugPanel = document.getElementById('debugPanel');
        const toggleDebugBtn = document.getElementById('toggleDebugBtn');

        const defaultBase = (window.location.origin && window.location.origin !== 'null')
            ? window.location.origin
            : 'http://localhost:8080';

        const state = {
            sessionId: null,
            loading: false,
            debugEnabled: false,
            apiBase: defaultBase
        };

        baseInput.value = state.apiBase;

        function setLoading(loading) {
            state.loading = loading;
            sendBtn.disabled = loading;
            messageInput.disabled = loading;
            readyStatus.textContent = loading ? 'Sending...' : 'Assistant ready';
        }

        function updateSessionDisplay() {
            sessionStatus.textContent = state.sessionId || 'None';
            copySessionBtn.disabled = !state.sessionId;
        }

        function addLog(entry) {
            if (!state.debugEnabled) {
            debugPanel.classList.add('hidden');
            toggleDebugBtn.textContent = 'Show Debug';
            return;
        }
        debugPanel.classList.remove('hidden');
        toggleDebugBtn.textContent = 'Hide Debug';
        const timestamp = new Date().toISOString();
        logOutput.textContent = `[${timestamp}] ${entry}\n` + logOutput.textContent;
        }

        function addMessage(role, content, extras = {}) {
            const wrapper = document.createElement('div');
            wrapper.className = `message ${role}`;

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = content;
            wrapper.appendChild(bubble);

            const meta = document.createElement('div');
            meta.className = 'meta';
            meta.innerHTML = `<span class="tag">${role === 'user' ? 'You' : 'Shade'}</span>
                              <span>${new Date().toLocaleTimeString()}</span>`;
            wrapper.appendChild(meta);

            if (role === 'assistant') {
                const details = document.createElement('div');
                details.className = 'details';

                if (extras.missingFields && extras.missingFields.length) {
                    const missing = document.createElement('div');
                    missing.innerHTML = `<h4>Missing Fields</h4>`;
                    const list = document.createElement('ul');
                    extras.missingFields.forEach(field => {
                        const li = document.createElement('li');
                        li.textContent = field;
                        list.appendChild(li);
                    });
                    missing.appendChild(list);
                    details.appendChild(missing);
                }

                if (extras.action) {
                    const action = document.createElement('div');
                    action.innerHTML = `<h4>Action</h4>
                        <div>Type: <strong>${extras.action.type}</strong></div>
                        <div>Status: ${extras.action.ready ? 'Ready' : 'Collecting details'}</div>`;
                    details.appendChild(action);
                }

                if (extras.suggestions && Object.keys(extras.suggestions).length) {
                    const suggestions = document.createElement('div');
                    suggestions.innerHTML = `<h4>Suggestions</h4>`;
                    const list = document.createElement('ul');
                    Object.entries(extras.suggestions).forEach(([key, values]) => {
                        const li = document.createElement('li');
                        li.textContent = `${key}: ${values.join(', ')}`;
                        list.appendChild(li);
                    });
                    suggestions.appendChild(list);
                    details.appendChild(suggestions);
                }

                if (details.children.length) {
                    wrapper.appendChild(details);
                }
            }

            messagesEl.appendChild(wrapper);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || state.loading) {
                return;
            }

            addMessage('user', message);
            messageInput.value = '';
            setLoading(true);

            const payload = { message };
            if (state.sessionId) {
                payload.sessionId = state.sessionId;
            }

            const headers = { 'Content-Type': 'application/json' };
            const token = tokenInput.value.trim();
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }

            addLog(`Request payload: ${JSON.stringify(payload)}`);

            try {
            const url = buildUrl('/api/v1/assistant/shade/chat');
            addLog(`POST ${url}`);

            const response = await fetch(url, {
                method: 'POST',
                headers,
                body: JSON.stringify(payload)
            });

                if (!response.ok) {
                    const errorText = await response.text();
                    addMessage('assistant', `Error: ${response.status} ${response.statusText}\n${errorText}`);
                    addLog(`Error response: ${errorText}`);
                    return;
                }

                let data;
                try {
                    data = await response.json();
                } catch (parseError) {
                    addMessage('assistant', `Unable to parse response JSON. Check debug log for details.`);
                    addLog(`JSON parse error: ${parseError instanceof Error ? parseError.message : String(parseError)}`);
                    return;
                }
                state.sessionId = data.sessionId || state.sessionId;
                updateSessionDisplay();

                addLog(`Response data: ${JSON.stringify(data)}`);

                addMessage('assistant', data.message || '[No message]', {
                    missingFields: data.missingFields,
                    action: data.action,
                    suggestions: data.suggestions
                });

                if (data.confirmationMessage) {
                    addMessage('assistant', data.confirmationMessage);
                }
            } catch (error) {
                const message = error instanceof Error ? error.message : String(error);
                addMessage('assistant', `Request failed: ${message}`);
                addLog(`Request failed: ${message}`);
            } finally {
                setLoading(false);
            }
        }

        function startNewSession() {
            state.sessionId = null;
            updateSessionDisplay();
            addMessage('assistant', 'Started a new session. How can I help you plan your event today?');
        }

        function clearConversation() {
            messagesEl.innerHTML = '';
            addMessage('assistant', 'Conversation cleared. Session still active.');
        }

        function copySessionId() {
            if (!state.sessionId) return;
            navigator.clipboard.writeText(state.sessionId)
                .then(() => addMessage('assistant', `Session ID copied: ${state.sessionId}`))
                .catch(() => addMessage('assistant', 'Unable to copy session ID'));
        }

        function buildUrl(path) {
            let base = state.apiBase ? state.apiBase.trim() : '';

            if (!base) {
                base = defaultBase;
                state.apiBase = base;
                baseInput.value = base;
            }

            if (!/^https?:\/\//i.test(base)) {
                base = `http://${base}`;
            }

            try {
                const trimmed = base.replace(/\/+$/,'');
                return `${trimmed}${path}`;
            } catch (err) {
                throw new Error(`Invalid API base URL: ${base}`);
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        newSessionBtn.addEventListener('click', startNewSession);
        clearBtn.addEventListener('click', clearConversation);
        copySessionBtn.addEventListener('click', copySessionId);
        toggleDebugBtn.addEventListener('click', () => {
            state.debugEnabled = !state.debugEnabled;
            if (!state.debugEnabled) {
                debugPanel.classList.add('hidden');
                toggleDebugBtn.textContent = 'Show Debug';
            } else {
                debugPanel.classList.remove('hidden');
                toggleDebugBtn.textContent = 'Hide Debug';
            }
        });
        baseInput.addEventListener('change', () => {
            const value = baseInput.value.trim();
            if (!value) {
                state.apiBase = defaultBase;
                baseInput.value = defaultBase;
                addLog(`API base reset to default: ${defaultBase}`);
                return;
            }
            state.apiBase = value;
            addLog(`API base updated: ${value}`);
        });
        messageInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });

        // Initial assistant greeting
        addMessage('assistant', 'Hi there! I am Shade, your event planning assistant. How can I help you today?');
    })();
</script>
</body>
</html>
