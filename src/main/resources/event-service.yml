spring:
  application:
    name: event-service
  flyway:
    enabled: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/eventplanner}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-openai-api-key}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.4
          max-tokens: 1000
      embedding:
        options:
          model: text-embedding-3-small
          dimensions: 1536
    pinecone:
      api-key: ${PINECONE_API_KEY:your-pinecone-api-key}
      environment: ${PINECONE_ENVIRONMENT:us-east-1-aws}
      project-name: ${PINECONE_PROJECT:event-planner}
      index-name: ${PINECONE_INDEX:event-templates}
    vectorstore:
      pinecone:
        index-name: event-templates
        namespace: event-planning
  cache:
    type: none

server:
  port: 8082

springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /v3/api-docs
