# Resilience4j Configuration for External System Integration
# Provides circuit breakers, retry logic, and fallback handling

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 100
        minimumNumberOfCalls: 10
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 60s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
        recordExceptions:
          - eventplanner.common.communication.exception.NotificationFailureException
          - eventplanner.common.communication.exception.EmailFailureException
          - org.springframework.amqp.AmqpException
          - java.io.IOException
          - java.net.ConnectException
    instances:
      notificationService:
        baseConfig: default
        slidingWindowSize: 50
        minimumNumberOfCalls: 5
        failureRateThreshold: 60
        waitDurationInOpenState: 30s
      emailService:
        baseConfig: default
        slidingWindowSize: 50
        minimumNumberOfCalls: 5
        failureRateThreshold: 70
        waitDurationInOpenState: 20s
      s3Service:
        baseConfig: default
        slidingWindowSize: 100
        minimumNumberOfCalls: 10
        failureRateThreshold: 40
        waitDurationInOpenState: 60s

  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 1000ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - eventplanner.common.communication.exception.NotificationFailureException
          - org.springframework.amqp.AmqpException
          - java.net.ConnectException
          - java.util.concurrent.TimeoutException
        ignoreExceptions:
          - java.lang.IllegalArgumentException
          - eventplanner.common.exception.BadRequestException
    instances:
      notificationService:
        baseConfig: default
        maxAttempts: 3
        waitDuration: 500ms
      emailService:
        baseConfig: default
        maxAttempts: 2
        waitDuration: 1000ms
      s3Upload:
        baseConfig: default
        maxAttempts: 3
        waitDuration: 2000ms
        exponentialBackoffMultiplier: 3

  ratelimiter:
    instances:
      notificationService:
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 0s

# Spring Retry Configuration
spring:
  retry:
    enabled: true

# Actuator endpoints for monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,retry
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        notification.send: true
        email.send: true
    tags:
      application: ${spring.application.name}
      environment: ${spring.profiles.active:default}
