server:
  port: ${PORT:8080}

spring:
  application:
    name: event-planner-monolith
  
  # Active profile - defaults to prod on main branch, dev on development branch
  # Override with SPRING_PROFILES_ACTIVE environment variable
  # Development branch uses 'dev' profile, main branch uses 'prod' profile
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
  
  # Enable JPA for auth system only
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ReactiveElasticsearchRepositoriesAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.metrics.SystemMetricsAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.metrics.web.tomcat.TomcatMetricsAutoConfiguration
  
  # Component scan to exclude problematic services
  main:
    allow-bean-definition-overriding: true
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false  # Disable Open Session In View to prevent lazy loading issues
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false  # Default: false (prod)
        # Suppress foreign key constraint errors during schema update (orphaned data is cleaned up on startup)
        jdbc.batch_size: 20
        order_inserts: true
        order_updates: true
    defer-datasource-initialization: true
  
  # Database Configuration
  # Uses environment variables directly (set in Railway or .env.prod for local)
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=${DB_SSLMODE:require}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${DB_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_MAX_LIFETIME:1800000}
  
  redis:
    # Uses environment variables directly (set in Railway or .env.prod for local)
    host: ${SPRING_REDIS_HOST}
    port: ${SPRING_REDIS_PORT}
    password: ${SPRING_REDIS_PASSWORD:}
    timeout: ${SPRING_REDIS_TIMEOUT:2000ms}
    database: ${SPRING_REDIS_DATABASE:0}
    lettuce:
      pool:
        max-active: ${SPRING_REDIS_POOL_MAX_ACTIVE:8}
        max-idle: ${SPRING_REDIS_POOL_MAX_IDLE:8}
        min-idle: ${SPRING_REDIS_POOL_MIN_IDLE:0}
  
  
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL}
          temperature: ${OPENAI_CHAT_TEMPERATURE}
          max-tokens: ${OPENAI_CHAT_MAX_TOKENS}
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL}
          dimensions: ${OPENAI_EMBEDDING_DIMENSIONS}
    pinecone:
      api-key: ${PINECONE_API_KEY}
      environment: ${PINECONE_ENVIRONMENT}
      project-name: ${PINECONE_PROJECT}
      index-name: ${PINECONE_INDEX}
    vectorstore:
      pinecone:
        index-name: ${PINECONE_VECTORSTORE_INDEX}
        namespace: ${PINECONE_VECTORSTORE_NAMESPACE}
  
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=${CACHE_MAX_SIZE:1000},expireAfterWrite=${CACHE_EXPIRE_AFTER_WRITE:300s}

assistant:
  service:
    base-url: ${SHADE_ASSISTANT_URL:${EXTERNAL_AI_SERVICE_URL:http://shade-ai-service:8000}}

aws:
  s3:
    access-key-id: ${AWS_ACCESS_KEY_ID:}
    secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
    region: ${AWS_REGION:}
    buckets:
      user: ${AWS_S3_USER_BUCKET:}
      event: ${AWS_S3_EVENT_BUCKET:}
    endpoint: ${AWS_S3_ENDPOINT:}
    path-style-access-enabled: ${AWS_S3_PATH_STYLE:false}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET} 
  expiration: ${JWT_EXPIRATION:86400000} 
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# Authentication Configuration
auth:
  session:
    max-concurrent: ${AUTH_SESSION_MAX_CONCURRENT:5}
    cleanup-interval-ms: ${AUTH_SESSION_CLEANUP_INTERVAL_MS:3600000}
  lockout:
    max-attempts: ${AUTH_LOCKOUT_MAX_ATTEMPTS:5}
    initial-duration-minutes: ${AUTH_LOCKOUT_INITIAL_DURATION_MINUTES:15}
    max-duration-hours: ${AUTH_LOCKOUT_MAX_DURATION_HOURS:24}

# Feed Posts Configuration
feeds:
  cleanup:
    # Maximum age for incomplete uploads before cleanup (in minutes)
    max-age-minutes: ${FEEDS_CLEANUP_MAX_AGE_MINUTES:5}
    # Cron expression for cleanup job (runs every 5 minutes by default)
    # Format: second, minute, hour, day, month, weekday
    # "0 */5 * * * *" = every 5 minutes
    # "0 * * * * *" = every minute
    cron: ${FEEDS_CLEANUP_CRON:0 */5 * * * *}

# Application Configuration
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
  base-url: ${APP_BASE_URL:http://localhost:8080}

# Service Authentication (for AI service and other internal services)
service:
  auth:
    enabled: ${SERVICE_AUTH_ENABLED:true}
    api-key: ${SERVICE_API_KEY:}
 

# Branded QR code rendering defaults
qr-code:
  defaults:
    size: 320
    foreground-color: "#111827"
    background-color: "#ffffff"
    gradient-enabled: false
    gradient-start-color: "#111827"
    gradient-end-color: "#1f2937"
    gradient-vertical: true
    dot-shape: ROUNDED
    quiet-zone: 2
    rounded-corners: true
    corner-radius: 24
    error-correction: H
    logo:
      enabled: true
      path: static/images/shade_app_icon.png
      size: 72
      rounded: true
      padding: 16
      background-color: "#ffffff"
      background-visible: true
  event:
    gradient-enabled: true
    gradient-start-color: "#111827"
    gradient-end-color: "#2563eb"
    gradient-vertical: false
    logo:
      size: 80
      padding: 20
  attendee:
    foreground-color: "#2563eb"
    background-color: "#ffffff"
    logo:
      size: 64
      padding: 12

# External API Keys
external:
  resend:
    api-key: ${RESEND_API_KEY}
    from-email: ${RESEND_FROM_EMAIL}
  push-service:
    url: ${EXTERNAL_PUSH_SERVICE_URL:http://shade-push-service:3100}
    secret: ${EXTERNAL_PUSH_SERVICE_SECRET:}
  google:
    maps-api-key: ${GOOGLE_MAPS_API_KEY}

# Logging
logging:
  level:
    ai.eventplanner: ${LOG_LEVEL_APP:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}
    org.springframework.web: ${LOG_LEVEL_WEB:INFO}
    org.springframework.ai: ${LOG_LEVEL_AI:INFO}
    org.springframework.validation: ${LOG_LEVEL_VALIDATION:WARN}
  pattern:
    console: ${LOG_PATTERN:%d{yyyy-MM-dd HH:mm:ss} - %msg%n}

# Management endpoints
# SECURITY: Removed 'env' from default exposure to prevent secret leakage
# If needed for debugging, enable only in development and ensure proper authentication
management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS:health,info,metrics}
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_DETAILS:always}
  health:
    elasticsearch:
      enabled: ${MANAGEMENT_ELASTICSEARCH_ENABLED:false}

# OpenAPI Documentation
springdoc:
  swagger-ui:
    path: ${SWAGGER_UI_PATH}
  api-docs:
    path: ${API_DOCS_PATH}
  info:
    title: ${API_TITLE}
    description: ${API_DESCRIPTION}
    version: ${API_VERSION}

rbac:
  policy:
    location: classpath:rbac/RBAC_policy.yml
