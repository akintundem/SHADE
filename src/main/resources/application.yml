server:
  port: 8080

spring:
  application:
    name: event-planner-monolith
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
  
  # Enable JPA for auth system only
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ReactiveElasticsearchRepositoriesAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.metrics.SystemMetricsAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.metrics.web.tomcat.TomcatMetricsAutoConfiguration
  
  # Component scan to exclude problematic services
  main:
    allow-bean-definition-overriding: true
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: true
  
  # Database Configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${DB_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_MAX_LIFETIME:1800000}
  
  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}
    password: ${SPRING_REDIS_PASSWORD:}
    timeout: ${SPRING_REDIS_TIMEOUT:2000ms}
    database: ${SPRING_REDIS_DATABASE:0}
    lettuce:
      pool:
        max-active: ${SPRING_REDIS_POOL_MAX_ACTIVE:8}
        max-idle: ${SPRING_REDIS_POOL_MAX_IDLE:8}
        min-idle: ${SPRING_REDIS_POOL_MIN_IDLE:0}
  
  
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL}
          temperature: ${OPENAI_CHAT_TEMPERATURE}
          max-tokens: ${OPENAI_CHAT_MAX_TOKENS}
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL}
          dimensions: ${OPENAI_EMBEDDING_DIMENSIONS}
    pinecone:
      api-key: ${PINECONE_API_KEY}
      environment: ${PINECONE_ENVIRONMENT}
      project-name: ${PINECONE_PROJECT}
      index-name: ${PINECONE_INDEX}
    vectorstore:
      pinecone:
        index-name: ${PINECONE_VECTORSTORE_INDEX}
        namespace: ${PINECONE_VECTORSTORE_NAMESPACE}
  
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=${CACHE_MAX_SIZE:1000},expireAfterWrite=${CACHE_EXPIRE_AFTER_WRITE:300s}

assistant:
  service:
    base-url: ${SHADE_ASSISTANT_URL:http://python-app:8000}

# Firebase Configuration
firebase:
  service-account-key: ${FIREBASE_SERVICE_ACCOUNT_KEY}
  project-id: ${FIREBASE_PROJECT_ID}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET} 
  expiration: ${JWT_EXPIRATION:86400000} 
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# Authentication Configuration
auth:
  session:
    max-concurrent: ${AUTH_SESSION_MAX_CONCURRENT:5}

# Application Configuration
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS} 

# External API Keys
external:
  sendgrid:
    api-key: ${SENDGRID_API_KEY}
    from-email: ${SENDGRID_FROM_EMAIL}
  google:
    maps-api-key: ${GOOGLE_MAPS_API_KEY}
  openweather:
    api-key: ${OPENWEATHER_API_KEY}

# Logging
logging:
  level:
    ai.eventplanner: ${LOG_LEVEL_APP:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}
    org.springframework.web: ${LOG_LEVEL_WEB:INFO}
    org.springframework.ai: ${LOG_LEVEL_AI:INFO}
    org.springframework.validation: ${LOG_LEVEL_VALIDATION:WARN}
  pattern:
    console: ${LOG_PATTERN:%d{yyyy-MM-dd HH:mm:ss} - %msg%n}

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS:health,info,metrics,env}
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_DETAILS:always}
  health:
    elasticsearch:
      enabled: ${MANAGEMENT_ELASTICSEARCH_ENABLED:false}

# OpenAPI Documentation
springdoc:
  swagger-ui:
    path: ${SWAGGER_UI_PATH}
  api-docs:
    path: ${API_DOCS_PATH}
  info:
    title: ${API_TITLE}
    description: ${API_DESCRIPTION}
    version: ${API_VERSION}

rbac:
  config:
    location: classpath:rbac/rbac-config.yml
