server:
  port: 8080
  error:
    include-stacktrace: never
    include-message: never
    include-exception: false
    include-binding-errors: never
    whitelabel:
      enabled: false

spring:
  application:
    name: event-planner-monolith
  
  # Active profile - defaults to prod on main branch, dev on development branch
  # Override with SPRING_PROFILES_ACTIVE environment variable
  # Development branch uses 'dev' profile, main branch uses 'prod' profile
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
  
  # Enable JPA for auth system only
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ReactiveElasticsearchRepositoriesAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.metrics.SystemMetricsAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.metrics.web.tomcat.TomcatMetricsAutoConfiguration
  
  # Component scan to exclude problematic services
  main:
    allow-bean-definition-overriding: true
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false  # Disable Open Session In View to prevent lazy loading issues
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false  # Default: false (prod)
        # Suppress foreign key constraint errors during schema update (orphaned data is cleaned up on startup)
        jdbc.batch_size: 20
        order_inserts: true
        order_updates: true
    defer-datasource-initialization: false
  
  # Database Configuration
  # Uses environment variables directly (set in Railway or .env.prod for local)
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=${DB_SSLMODE:require}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  redis:
    # Uses environment variables directly (set in Railway or .env.prod for local)
    host: ${SPRING_REDIS_HOST}
    port: ${SPRING_REDIS_PORT}
    password: ${SPRING_REDIS_PASSWORD:}
    timeout: ${SPRING_REDIS_TIMEOUT:2000ms}
    database: ${SPRING_REDIS_DATABASE:0}
    lettuce:
      pool:
        max-active: ${SPRING_REDIS_POOL_MAX_ACTIVE:8}
        max-idle: ${SPRING_REDIS_POOL_MAX_IDLE:8}
        min-idle: ${SPRING_REDIS_POOL_MIN_IDLE:0}
  
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${COGNITO_ISSUER_URI}
          jwk-set-uri: ${COGNITO_JWK_SET_URI}
          audiences: ${COGNITO_AUDIENCE}
  
  
  
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=300s
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    check-location: true

rabbitmq:
  url: ${RABBITMQ_URL}
  exchange: ${RABBITMQ_EXCHANGE}
  email-routing-key: ${RABBITMQ_EMAIL_ROUTING_KEY}
  push-routing-key: ${RABBITMQ_PUSH_ROUTING_KEY}

external:
  email:
    from: ${EXTERNAL_EMAIL_FROM}
    from-events: ${EXTERNAL_EMAIL_FROM_EVENTS}

aws:
  s3:
    access-key-id: ${AWS_ACCESS_KEY_ID:}
    secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
    region: ${AWS_REGION:}
    buckets:
      user: ${AWS_S3_USER_BUCKET:}
      event: ${AWS_S3_EVENT_BUCKET:}
    endpoint: ${AWS_S3_ENDPOINT:}
    path-style-access-enabled: ${AWS_S3_PATH_STYLE:false}
  cognito:
    user-pool-id: ${AWS_COGNITO_USER_POOL_ID}
    region: ${AWS_COGNITO_REGION}

# Feed Posts Configuration
feeds:
  cleanup:
    # Maximum age for incomplete uploads before cleanup (in minutes)
    max-age-minutes: ${FEEDS_CLEANUP_MAX_AGE_MINUTES}
    # Cron expression for cleanup job (runs every 5 minutes by default)
    # Format: second, minute, hour, day, month, weekday
    # "0 */5 * * * *" = every 5 minutes
    # "0 * * * * *" = every minute
    cron: ${FEEDS_CLEANUP_CRON}

# Application Configuration
app:
  base-url: ${APP_BASE_URL}
  ticket:
    qr-secret: ${APP_TICKET_QR_SECRET}

# Service Authentication (Kong gateway API key validation)
# GATEWAY_SERVICE_API_KEY is the canonical key shared between Kong and Java app
service:
  auth:
    enabled: ${SERVICE_AUTH_ENABLED}
    # REQUIRED: API key injected by Kong via X-API-Key header
    api-key: ${SERVICE_API_KEY}
    # Require X-API-Key header for all non-actuator requests (enforced in production)
    require-header: ${SERVICE_AUTH_REQUIRE_HEADER}
    allow-service-role-paths: ${SERVICE_ROLE_ALLOWED_PATHS}

# Security Configuration
security:
  # JWT auto-provisioning (create user account on first JWT validation)
  jwt:
    auto-provision: ${SECURITY_JWT_AUTO_PROVISION}

rbac:
  policy:
    location: ${RBAC_POLICY_LOCATION}
  


# Branded QR code rendering defaults
qr-code:
  defaults:
    size: 320
    foreground-color: "#111827"
    background-color: "#ffffff"
    gradient-enabled: false
    gradient-start-color: "#111827"
    gradient-end-color: "#1f2937"
    gradient-vertical: true
    dot-shape: ROUNDED
    quiet-zone: 2
    rounded-corners: true
    corner-radius: 24
    error-correction: H
    logo:
      enabled: true
      path: static/images/shade_app_icon.png
      size: 72
      rounded: true
      padding: 16
      background-color: "#ffffff"
      background-visible: true
  event:
    gradient-enabled: true
    gradient-start-color: "#111827"
    gradient-end-color: "#2563eb"
    gradient-vertical: false
    logo:
      size: 80
      padding: 20
  attendee:
    foreground-color: "#2563eb"
    background-color: "#ffffff"
    logo:
      size: 64
      padding: 12

# Logging
logging:
  level:
    ai.eventplanner: INFO
    org.springframework.security: WARN
    org.springframework.web: INFO
    org.springframework.ai: INFO
    org.springframework.validation: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Management endpoints
# SECURITY: Removed 'env' from default exposure to prevent secret leakage
# If needed for debugging, enable only in development and ensure proper authentication
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    elasticsearch:
      enabled: false

# OpenAPI Documentation
springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /v3/api-docs
  info:
    title: Event Planner API
    description: Event planning platform
    version: 1.0.0
