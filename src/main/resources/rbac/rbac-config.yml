# ============================================================================
# RBAC (Role-Based Access Control) Configuration
# ============================================================================
#
# This file defines access control rules for all API endpoints using RBAC.
#
# KEY CONCEPTS:
#
# 1. SCOPE - Determines WHERE permission checks happen:
#    -------------------------------------------------------------------------
#    SYSTEM:     Global, platform-wide permissions. Checks system roles
#                (ROLE_ADMIN, ROLE_USER, etc.). No resource-specific context.
#                Example: GET /api/v1/events/search - any authenticated user
#                         with system-level "event.read" can search.
#
#    EVENT:      Event-specific permissions. Requires eventId from URL.
#                Checks roles within that specific event (ORGANIZER, COORDINATOR,
#                STAFF, etc.). Requires resourceIdGroup to extract eventId.
#                Example: GET /api/v1/events/{eventId} - checks if user has
#                         an event role in that specific event.
#
#    ORGANIZATION: Organization-specific permissions. Requires organizationId
#                  from URL. Checks roles within that organization (OWNER, MANAGER,
#                  MEMBER, etc.). Requires resourceIdGroup to extract organizationId.
#                  Example: GET /api/v1/auth/organizations/{organizationId}
#
#    PUBLIC:     No permission check - always allowed (after authentication
#                if required). Used for public endpoints.
#
# 2. PERMISSION - What action is being checked:
#    -------------------------------------------------------------------------
#    Format: "resource.action" (e.g., "event.read", "user.update")
#    Wildcards: "event.*" matches all event permissions
#    Special: "*" matches all permissions (super admin only)
#
# 3. ALLOWOWNER - Bypass permission check for resource owners:
#    -------------------------------------------------------------------------
#    If true: Resource owners can access even without the required permission.
#    - For EVENT scope: Checks if user owns the event (event.ownerId == userId)
#    - For ORGANIZATION scope: Checks if user is organization owner
#    - For SYSTEM scope: Checks if user is accessing their own resource
#    Example: allowOwner: true on event.update means event owners can update
#             their events even without "event.update" permission.
#
# 4. ALLOWAUTHENTICATED - Bypass permission check for any authenticated user:
#    -------------------------------------------------------------------------
#    If true: Any logged-in user can access, regardless of roles/permissions.
#    Useful for endpoints that should be accessible to all authenticated users.
#    Example: allowAuthenticated: true on event.create means any logged-in
#             user can create events.
#
# 5. RESOURCEIDGROUP - Extracts resource ID from URL pattern:
#    -------------------------------------------------------------------------
#    Specifies which regex capture group contains the resource ID.
#    - Can be a number (1, 2, etc.) for positional groups
#    - Can be a named group name (eventId, organizationId, userId, etc.)
#    Required for EVENT and ORGANIZATION scopes to identify the resource.
#    Example: pattern: "^/api/v1/events/(?<eventId>[a-f0-9-]+)$"
#             resourceIdGroup: eventId
#             Extracts the UUID from the URL to check event-specific permissions.
#
# 6. PATTERN - Regex pattern matching URL paths:
#    -------------------------------------------------------------------------
#    Uses Java regex syntax. Named groups like (?<eventId>...) are preferred
#    for clarity. Routes are matched in order - first match wins.
#
# 7. ROLES - Define what permissions each role has:
#    -------------------------------------------------------------------------
#    Three role hierarchies:
#    - system: Platform-wide roles (ROLE_ADMIN, ROLE_USER, etc.)
#    - organization: Organization-scoped roles (OWNER, MANAGER, MEMBER)
#    - event: Event-scoped roles (ORGANIZER, COORDINATOR, STAFF, etc.)
#
#    Each role lists permissions it grants. Permissions are checked based on
#    the SCOPE of the route being accessed.
#
# PERMISSION CHECK FLOW:
#    -------------------------------------------------------------------------
#    1. Request comes in → Match route pattern
#    2. Extract resource ID (if EVENT/ORGANIZATION scope)
#    3. Check allowAuthenticated → If true, allow
#    4. Check allowOwner → If true and user is owner, allow
#    5. Check hasPermission → Look up user's roles based on SCOPE:
#       - SYSTEM scope: Check system roles
#       - EVENT scope: Check event roles for that specific event
#       - ORGANIZATION scope: Check organization roles for that org
#    6. If all checks fail → Deny access (403 Forbidden)
#
# IMPORTANT: DATA-LEVEL ACCESS CONTROL (Private/Public)
#    -------------------------------------------------------------------------
#    This RBAC config handles WHO can access (roles/permissions), but NOT
#    data-level visibility rules like private vs public events.
#
#    Private/Public checks happen in APPLICATION LOGIC, not here:
#    - Event.isPublic field is checked in AuthorizationService.canAccessEvent()
#    - EventService.getByIdWithAccessControl() filters based on isPublic
#    - Private events require ownership or event role, even if RBAC allows access
#
#    Example: GET /api/v1/events/{eventId} with scope: EVENT
#    - RBAC checks: Does user have event role or is owner? ✅
#    - Application logic ALSO checks: Is event public? If private, is user owner?
#    - Both must pass for access to be granted
#
#    This separation allows:
#    - RBAC config: Define permission structure (roles, scopes)
#    - Application logic: Enforce data-level rules (private/public, ownership)
#
# ============================================================================

routes:
  - name: event-collaborators
    pattern: ^/api/v1/events/([a-f0-9-]+)/collaborators(?:/([a-f0-9-]+))?$
    resourceIdGroup: 1
    methods:
      GET:
        permission: event.read
        scope: EVENT
        allowOwner: true
      POST:
        permission: role.assign
        scope: EVENT
        allowOwner: true
      PUT:
        permission: role.assign
        scope: EVENT
        allowOwner: true
      DELETE:
        permission: role.remove
        scope: EVENT
        allowOwner: true

  - name: event-reminders
    pattern: ^/api/v1/events/([a-f0-9-]+)/reminders(?:/([a-f0-9-]+))?$
    resourceIdGroup: 1
    methods:
      GET:
        permission: event.read
        scope: EVENT
        allowOwner: true
      POST:
        permission: event.update
        scope: EVENT
        allowOwner: true
      PUT:
        permission: event.update
        scope: EVENT
        allowOwner: true
      DELETE:
        permission: event.update
        scope: EVENT
        allowOwner: true

  - name: event-notifications
    pattern: ^/api/v1/events/([a-f0-9-]+)/notifications(?:/send)?$
    resourceIdGroup: 1
    methods:
      GET:
        permission: event.read
        scope: EVENT
        allowOwner: true
      PUT:
        permission: event.update
        scope: EVENT
        allowOwner: true
      POST:
        permission: communication.send
        scope: EVENT
        allowOwner: true


  # Example: SYSTEM scope - checks system roles, no resource ID needed
  - name: events-collection
    pattern: "^/api/v1/events$"
    methods:
      GET:
        permission: "event.read"
        scope: SYSTEM  # Checks if user has system role with "event.read"
      POST:
        permission: "event.create"
        scope: SYSTEM
        allowAuthenticated: true  # Any authenticated user can create events

  # Example: EVENT scope - checks event-specific roles, requires eventId from URL
  - name: event-item
    pattern: "^/api/v1/events/(?<eventId>[a-f0-9-]+)$"
    resourceIdGroup: eventId  # Extracts eventId from URL for permission check
    methods:
      GET:
        permission: "event.read"
        scope: EVENT  # Checks if user has event role (ORGANIZER, COORDINATOR, etc.) in this specific event
        allowOwner: true  # Event owners can always read their events
        allowAuthenticated: true  # Also allows any authenticated user (for public events)
      PUT:
        permission: "event.update"
        scope: EVENT
        allowOwner: true
      DELETE:
        permission: "event.delete"
        scope: EVENT
        allowOwner: true

  - name: event-sub-resources
    pattern: "^/api/v1/events/(?<eventId>[a-f0-9-]+)/.*$"
    resourceIdGroup: eventId
    methods:
      GET:
        permission: "event.read"
        scope: EVENT
        allowOwner: true
      POST:
        permission: "event.update"
        scope: EVENT
        allowOwner: true
      PUT:
        permission: "event.update"
        scope: EVENT
        allowOwner: true
      DELETE:
        permission: "event.delete"
        scope: EVENT
        allowOwner: true

  - name: events-by-type
    pattern: "^/api/v1/events/by-type/[^/]+$"
    methods:
      GET:
        permission: "event.read"
        scope: SYSTEM
        allowAuthenticated: true

  - name: events-by-status
    pattern: "^/api/v1/events/by-status/[^/]+$"
    methods:
      GET:
        permission: "event.read"
        scope: SYSTEM
        allowAuthenticated: true

  - name: events-discovery
    pattern: "^/api/v1/events/(public|featured|trending|upcoming)$"
    methods:
      GET:
        permission: "event.read"
        scope: SYSTEM
        allowAuthenticated: true

  - name: events-search
    pattern: "^/api/v1/events/search$"
    methods:
      GET:
        permission: "event.read"
        scope: SYSTEM
        allowAuthenticated: true

  - name: events-user-collections
    pattern: "^/api/v1/events/user/(?<userId>[a-f0-9-]+)(/(owned|upcoming|past))?$"
    resourceIdGroup: userId
    methods:
      GET:
        permission: "event.read"
        scope: SYSTEM
        allowOwner: true

  - name: events-my-collections
    pattern: "^/api/v1/events/my-events(/(owned|upcoming|past))?$"
    methods:
      GET:
        permission: "event.read"
        scope: SYSTEM
        allowAuthenticated: true

  - name: budgets-collection
    pattern: "^/api/v1/budgets$"
    methods:
      GET:
        permission: "budget.read"
        scope: SYSTEM
        allowAuthenticated: true
      POST:
        permission: "budget.create"
        scope: SYSTEM
        allowAuthenticated: true

  - name: budget-item
    pattern: "^/api/v1/budgets/(?<resourceId>[a-f0-9-]+)(/.*)?$"
    resourceIdGroup: resourceId
    methods:
      GET:
        permission: "budget.read"
        scope: SYSTEM
        allowAuthenticated: true
      POST:
        permission: "budget.update"
        scope: SYSTEM
        allowAuthenticated: true
      PUT:
        permission: "budget.update"
        scope: SYSTEM
        allowAuthenticated: true
      DELETE:
        permission: "budget.delete"
        scope: SYSTEM
        allowAuthenticated: true

  - name: budget-categories
    pattern: "^/api/v1/budgets/categories$"
    methods:
      GET:
        permission: "budget.read"
        scope: SYSTEM
        allowAuthenticated: true

  - name: vendors-collection
    pattern: "^/api/v1/vendors$"
    methods:
      GET:
        permission: "vendor.read"
        scope: SYSTEM
      POST:
        permission: "vendor.create"
        scope: SYSTEM

  - name: vendor-item
    pattern: "^/api/v1/vendors/(?<vendorId>[a-f0-9-]+)$"
    resourceIdGroup: vendorId
    methods:
      GET:
        permission: "vendor.read"
        scope: SYSTEM
      PUT:
        permission: "vendor.update"
        scope: SYSTEM
      DELETE:
        permission: "vendor.delete"
        scope: SYSTEM

  # Example: EVENT scope with different permission - vendor operations scoped to an event
  - name: event-vendors
    pattern: "^/api/v1/events/(?<eventId>[a-f0-9-]+)/vendors.*$"
    resourceIdGroup: eventId  # Uses eventId to check event roles
    methods:
      GET:
        permission: "vendor.read"  # Different permission, but still EVENT scope
        scope: EVENT  # Checks event roles, not system vendor permissions
        allowOwner: true  # Event owners can manage vendors in their events
      POST:
        permission: "vendor.create"
        scope: EVENT
        allowOwner: true
      PUT:
        permission: "vendor.update"
        scope: EVENT
        allowOwner: true
      DELETE:
        permission: "vendor.delete"
        scope: EVENT
        allowOwner: true

  - name: role-assignment
    pattern: "^/api/v1/roles/events/(?<eventId>[a-f0-9-]+)/assign$"
    resourceIdGroup: eventId
    methods:
      POST:
        permission: "role.assign"
        scope: EVENT
        allowOwner: true

  - name: role-remove
    pattern: "^/api/v1/roles/events/(?<eventId>[a-f0-9-]+)/users/(?<userId>[a-f0-9-]+)/roles/[^/]+$"
    resourceIdGroup: eventId
    methods:
      DELETE:
        permission: "role.remove"
        scope: EVENT
        allowOwner: true

  - name: role-read
    pattern: "^/api/v1/roles/events/(?<eventId>[a-f0-9-]+)/.*$"
    resourceIdGroup: eventId
    methods:
      GET:
        permission: "role.read"
        scope: EVENT
        allowOwner: true

  - name: organization-collection
    pattern: "^/api/v1/auth/organizations$"
    methods:
      GET:
        permission: "organization.read"
        scope: SYSTEM
      POST:
        permission: "organization.create"
        scope: SYSTEM

  # Example: ORGANIZATION scope - checks organization-specific roles
  - name: organization-item
    pattern: "^/api/v1/auth/organizations/(?<organizationId>[a-f0-9-]+)$"
    resourceIdGroup: organizationId  # Extracts organizationId from URL
    methods:
      GET:
        permission: "organization.read"
        scope: ORGANIZATION  # Checks if user has org role (OWNER, MANAGER, MEMBER) in this specific organization
        allowOwner: true  # Organization owners can always read their organizations
      PUT:
        permission: "organization.update"
        scope: ORGANIZATION
        allowOwner: true
      DELETE:
        permission: "organization.delete"
        scope: ORGANIZATION
        allowOwner: true

  - name: users-collection
    pattern: "^/api/v1/auth/users$"
    methods:
      GET:
        permission: "user.read"
        scope: SYSTEM
      POST:
        permission: "user.create"
        scope: SYSTEM

  - name: user-item
    pattern: "^/api/v1/auth/users/(?<userId>[a-f0-9-]+)$"
    resourceIdGroup: userId
    methods:
      GET:
        permission: "user.read"
        scope: SYSTEM
      PUT:
        permission: "user.update"
        scope: SYSTEM
        allowOwner: true
      DELETE:
        permission: "user.delete"
        scope: SYSTEM

  - name: auth-me
    pattern: "^/api/v1/auth/me$"
    methods:
      GET:
        permission: "user.read"
        scope: SYSTEM
        allowAuthenticated: true

  - name: auth-change-password
    pattern: "^/api/v1/auth/change-password$"
    methods:
      POST:
        permission: "user.update"
        scope: SYSTEM
        allowAuthenticated: true

  - name: auth-sessions
    pattern: "^/api/v1/auth/sessions$"
    methods:
      GET:
        permission: "user.read"
        scope: SYSTEM
        allowAuthenticated: true

  - name: auth-sessions-all
    pattern: "^/api/v1/auth/sessions/all$"
    methods:
      DELETE:
        permission: "user.update"
        scope: SYSTEM
        allowAuthenticated: true

  - name: auth-logout
    pattern: "^/api/v1/auth/logout$"
    methods:
      POST:
        permission: "user.update"
        scope: SYSTEM
        allowAuthenticated: true

  - name: timeline
    pattern: "^/api/v1/timeline/(?<eventId>[a-f0-9-]+)(/view|/tasks|/summary|/upcoming|/overdue|/search)(/.*)?$"
    resourceIdGroup: eventId
    methods:
      GET:
        permission: "timeline.read"
        scope: EVENT
        allowOwner: true
        allowAuthenticated: true
      POST:
        permission: "timeline.create"
        scope: EVENT
        allowOwner: true
      PUT:
        permission: "timeline.update"
        scope: EVENT
        allowOwner: true
      DELETE:
        permission: "timeline.delete"
        scope: EVENT
        allowOwner: true

  - name: timeline-tasks
    pattern: "^/api/v1/timeline/(?<eventId>[a-f0-9-]+)/tasks$"
    resourceIdGroup: eventId
    methods:
      GET:
        permission: "timeline.read"
        scope: EVENT
        allowOwner: true
        allowAuthenticated: true
      POST:
        permission: "timeline.create"
        scope: EVENT
        allowOwner: true

  - name: timeline-task-item
    pattern: "^/api/v1/timeline/tasks/(?<taskId>[a-f0-9-]+)(/.*)?$"
    resourceIdGroup: taskId
    methods:
      GET:
        permission: "timeline.read"
        scope: EVENT
        allowOwner: true
        allowAuthenticated: true
      PUT:
        permission: "timeline.update"
        scope: EVENT
        allowOwner: true
        allowAuthenticated: true
      DELETE:
        permission: "timeline.delete"
        scope: EVENT
        allowOwner: true
      POST:
        permission: "timeline.update"
        scope: EVENT
        allowOwner: true
        allowAuthenticated: true

  - name: timeline-bulk
    pattern: "^/api/v1/timeline/(?<eventId>[a-f0-9-]+)/tasks/bulk$"
    resourceIdGroup: eventId
    methods:
      PUT:
        permission: "timeline.update"
        scope: EVENT
        allowOwner: true

  - name: risks
    pattern: "^/api/v1/risks/(?<eventId>[a-f0-9-]+)$"
    resourceIdGroup: eventId
    methods:
      GET:
        permission: "risk.read"
        scope: EVENT
        allowOwner: true

  - name: attendees
    pattern: "^/api/v1/events/(?<eventId>[a-f0-9-]+)/(attendances.*|users.*)$"
    resourceIdGroup: eventId
    methods:
      GET:
        permission: "attendee.read"
        scope: EVENT
        allowOwner: true
      POST:
        permission: "attendee.create"
        scope: EVENT
        allowOwner: true
      PUT:
        permission: "attendee.update"
        scope: EVENT
        allowOwner: true
      DELETE:
        permission: "attendee.delete"
        scope: EVENT
        allowOwner: true

  - name: platform-payments
    pattern: "^/api/platform-payments.*$"
    methods:
      GET:
        permission: "payment.read"
        scope: SYSTEM
      POST:
        permission: "payment.create"
        scope: SYSTEM
      PUT:
        permission: "payment.update"
        scope: SYSTEM

  - name: admin
    pattern: "^/api/v1/admin/.*$"
    methods:
      GET:
        permission: "admin.read"
        scope: SYSTEM
      POST:
        permission: "admin.create"
        scope: SYSTEM
      PUT:
        permission: "admin.update"
        scope: SYSTEM
      DELETE:
        permission: "admin.delete"
        scope: SYSTEM

# ============================================================================
# ROLE DEFINITIONS
# ============================================================================
# Defines what permissions each role grants. Permissions are checked based on
# the SCOPE of the route:
# - SYSTEM scope routes check "system" roles
# - ORGANIZATION scope routes check "organization" roles  
# - EVENT scope routes check "event" roles
# ============================================================================

roles:
  # System roles: Platform-wide permissions, checked for SYSTEM scope routes
  system:
    ROLE_SUPER_ADMIN:
      - "*"
    ROLE_ADMIN:
      - "admin.*"
      - "organization.*"
      - "user.*"
      - "event.*"
      - "vendor.*"
      - "budget.*"
      - "timeline.*"
      - "risk.*"
      - "payment.*"
      - "role.*"
      - "communication.*"
    ROLE_MODERATOR:
      - "event.read"
      - "user.read"
      - "risk.read"
    ROLE_USER:
      - "event.read"
      - "communication.read"

  # Organization roles: Scoped to specific organizations, checked for ORGANIZATION scope routes
  organization:
    OWNER:
      - "organization.*"
      - "event.*"
      - "vendor.*"
      - "budget.*"
      - "timeline.*"
      - "role.*"
    MANAGER:
      - "organization.read"
      - "organization.update"
      - "event.read"
      - "event.update"
      - "vendor.*"
      - "budget.read"
      - "timeline.*"
      - "attendee.*"
    MEMBER:
      - "event.read"
      - "vendor.read"
      - "budget.read"

  # Event roles: Scoped to specific events, checked for EVENT scope routes
  event:
    ORGANIZER:
      - "event.*"
      - "budget.*"
      - "vendor.*"
      - "timeline.*"
      - "attendee.*"
      - "role.*"
      - "communication.*"
    COORDINATOR:
      - "event.read"
      - "event.update"
      - "budget.read"
      - "budget.update"
      - "vendor.read"
      - "vendor.update"
      - "timeline.*"
      - "attendee.*"
      - "communication.send"
    STAFF:
      - "event.read"
      - "attendee.*"
      - "timeline.read"
    VOLUNTEER:
      - "event.read"
    SECURITY:
      - "event.read"
    TECHNICAL:
      - "event.read"
    CATERING:
      - "event.read"
    CLEANUP:
      - "event.read"
    REGISTRATION:
      - "event.read"
      - "attendee.*"
    PHOTOGRAPHER:
      - "event.read"
    VIDEOGRAPHER:
      - "event.read"
    DJ:
      - "event.read"
    MC:
      - "event.read"
    SPEAKER:
      - "event.read"
    MODERATOR:
      - "event.read"
    SPONSOR:
      - "event.read"
    VENDOR:
      - "event.read"
      - "vendor.*"
    MEDIA:
      - "event.read"
    GUEST:
      - "event.read"
